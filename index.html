<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتكر ملابس أسطوري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-gray-800 dark:bg-gray-900 text-white py-4">
        <nav class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-lg font-bold">اتكر ملابس أسطوري</a>
            <button class="lg:block hidden md:block md:mx-4 text-blue-500 hover:text-blue-700 md:text-base md:ltr:text-right">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
            </button>
        </nav>
    </header>
    <main class="min-h-screen bg-gray-100 dark:bg-gray-800 pt-8">
        <!-- قسم Hero -->
        <section class="bg-cover bg-center h-96 mx-auto" style="background-image: url('https://picsum.photos/2000/1000')">
            <div class="container mx-auto relative z-10">
                <h1 class="text-5xl font-bold text-white">اتكر ملابس أسطوري</h1>
                <p class="text-lg text-white">اكتشف عالم الملابس الأسطوري والمبتكرة</p>
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">اكتشف الآن</button>
            </div>
        </section>
        <!-- قسم خدمات -->
        <section class="py-12">
            <h2 class="text-4xl font-bold text-gray-800 dark:text-white">خدماتنا</h2>
            <div class="container mx-auto flex flex-wrap justify-center">
                <div class="w-full md:w-1/3 xl:w-1/3 p-6 text-center">
                    <i class="fas fa-shopping-bag text-5xl text-red-500"></i>
                    <h3 class="text-lg text-gray-800 dark:text-white">تصميم ملابس</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">اكتشف عالم الملابس الأسطوري والمبتكرة</p>
                </div>
                <div class="w-full md:w-1/3 xl:w-1/3 p-6 text-center">
                    <i class="fas fa-shopping-cart text-5xl text-orange-500"></i>
                    <h3 class="text-lg text-gray-800 dark:text-white">بيع الملابس</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">اكتشف عالم الملابس الأسطوري والمبتكرة</p>
                </div>
                <div class="w-full md:w-1/3 xl:w-1/3 p-6 text-center">
                    <i class="fas fa-robot text-5xl text-teal-500"></i>
                    <h3 class="text-lg text-gray-800 dark:text-white">تصميم إلكتروني</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">اكتشف عالم الملابس الأسطوري والمبتكرة</p>
                </div>
            </div>
        </section>
        <!-- نموذج اتصال -->
        <section class="py-12">
            <h2 class="text-4xl font-bold text-gray-800 dark:text-white">اتصل بنا</h2>
            <div class="container mx-auto p-6">
                <form action="#" method="POST" class="flex flex-wrap -mx-3 mb-4">
                    <div class="w-full md:w-1/2 xl:w-1/3 p-3 mx-3">
                        <label for="name" class="block text-gray-700 text-sm font-bold mb-2">الاسم</label>
                        <input type="text" id="name" name="name" class="appearance-none block w-full bg-white border rounded py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-gray-500">
                    </div>
                    <div class="w-full md:w-1/2 xl:w-1/3 p-3 mx-3">
                        <label for="email" class="block text-gray-700 text-sm font-bold mb-2">البريد الالكتروني</label>
                        <input type="email" id="email" name="email" class="appearance-none block w-full bg-white border rounded py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-gray-500">
                    </div>
                    <div class="w-full p-3 mx-3">
                        <label for="message" class="block text-gray-700 text-sm font-bold mb-2">الرسالة</label>
                        <textarea id="message" name="message" class="appearance-none block w-full bg-white border rounded py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:bg-white focus:border-gray-500"></textarea>
                    </div>
                    <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">أرسل الرسالة</button>
                </form>
            </div>
        </section>
        <!-- التذييل -->
        <footer class="bg-gray-800 dark:bg-gray-900 text-white py-4 text-center">
            <p>صُنع بذكاء بواسطة براندو</p>
        </footer>
    </main>
</body>
</html>
